syntax = "proto3";

package products;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "marketplace-simulator-product/api/v1/proto;products";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Products API";
    version: "1.0.0";
  };
  schemes: HTTP;
  schemes: HTTPS;
  consumes: "application/json";
  produces: "application/json";
  security_definitions: {
    security: {
      key: "x-auth";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "x-auth";
      }
    }
  }

  security: {
    security_requirement: {
      key: "x-auth";
    }
  }
};

service Products {
  rpc GetProduct (GetProductRequest) returns (GetProductResponse) {
    option (google.api.http) = {
      get: "/v1/products/{sku}"
    };

    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Получение информации о продукте"
    };
  }

  rpc IncreaseProductCount (IncreaseProductCountRequest) returns (IncreaseProductCountResponse){
    option (google.api.http) = {
      post: "/v1/products/increase-count",
      body: "*"
    };
  }

  rpc ReserveProduct (ReserveProductRequest) returns (ReserveProductResponse){
    option (google.api.http) = {
      post: "/v1/products/reserve",
      body: "*"
    };
  }

  rpc ReleaseReservation (ReleaseReservationRequest) returns (ReleaseReservationResponse){
    option (google.api.http) = {
      post: "/v1/products/release-reservation",
      body: "*"
    };
  }

  rpc ConfirmReservation (ConfirmReservationRequest) returns (ConfirmReservationResponse){
    option (google.api.http) = {
      post: "/v1/products/confirm-reservation",
      body: "*"
    };
  }
}

message GetProductRequest {
  uint64 sku = 1;
}

message GetProductResponse {
  uint64 sku = 1;
  string name = 2;
  uint32 count = 3;
  double price = 4;
}

message IncreaseProductCountRequest {
  repeated IncreaseProductCountBatch products = 1;

  message IncreaseProductCountBatch {
    uint64 sku = 1;
    uint32 count = 2;
  }
}

message IncreaseProductCountResponse {}

message ReserveProductRequest {
  repeated ProductCountBatch products = 1;

  message ProductCountBatch {
    uint64 sku = 1;
    uint32 count = 2;
  }
}

message ReserveProductResponse {
  repeated ReservationResult results = 1;

  message ReservationResult {
    int64 reservation_id = 1;
    uint64 sku = 2;
  }
}

message ReleaseReservationRequest {
  repeated int64 reservation_ids = 1;
}

message ReleaseReservationResponse {}

message ConfirmReservationRequest {
  repeated int64 reservation_ids = 1;
}

message ConfirmReservationResponse {}
